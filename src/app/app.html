<!-- Loading Overlay -->
@if (isLoading()) {
<div class="loading-overlay">
  <div class="loading-content">
    <div class="spinner-container">
      <div class="spinner-glow"></div>
      <div class="spinner-outer"></div>
      <div class="spinner-inner"></div>
      <img src="assets/orbit-center.png" alt="Loading" class="spinner-img" />
    </div>
    <p class="loading-text">Initializing Portfolio...</p>
  </div>
</div>
}

<!-- App Shell -->
<app-navbar />

<main class="main-content" [@routeAnimation]="getRouteAnimationData()">
  <router-outlet />
</main>

<app-footer />
<app-voice-assistant />
