<section class="page-section showcase-explorer" id="showcase" #showcaseSection>
  <div class="container">
    <div class="page-header" @fadeInUp>
      <span class="section-label">Mastery</span>
      <h1 class="section-title gradient-text">Skill Butterfly</h1>
    </div>

    <div class="butterfly-wrap" [class.exit-mode]="!isVisible()">
      <!-- THE BUTTERFLY -->
      <div class="butterfly">
        <!-- MINI BUTTERFLIES (Particles) -->
        <div class="mini-butterfly p1"></div>
        <div class="mini-butterfly p2"></div>
        <div class="mini-butterfly p3"></div>
        <div class="mini-butterfly p4"></div>

        <!-- BODY -->
        <div class="butterfly-body">
          <div class="antennae"></div>
          <div class="thorax"></div>
          <div class="abdomen"></div>
        </div>

        <!-- LEFT WING -->
        <div class="wing-set left">
          <div class="wing-shape upper"></div>
          <div class="wing-shape lower"></div>
          <div class="wing-content">
            @for (item of items().slice(0, 11); track item.id; let i = $index) {
            <div class="skill-node" [style.--hex-color]="item.color" (click)="selectItem(item)">
              <img [src]="item.icon" [alt]="item.title" class="skill-logo">
            </div>
            }
          </div>
        </div>

        <!-- RIGHT WING -->
        <div class="wing-set right">
          <div class="wing-shape upper"></div>
          <div class="wing-shape lower"></div>
          <div class="wing-content">
            @for (item of items().slice(11, 22); track item.id; let i = $index) {
            <div class="skill-node" [style.--hex-color]="item.color" (click)="selectItem(item)">
              <img [src]="item.icon" [alt]="item.title" class="skill-logo">
            </div>
            }
          </div>
        </div>
      </div>
    </div>

    <div class="interaction-hint">
      <span class="hint-icon">🦋</span> Explore the Wings of Expertise
    </div>
  </div>
</section>
